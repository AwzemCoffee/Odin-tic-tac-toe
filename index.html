<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe</title>
    <script src="tictactoe.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="grid-container">
        <div class="sidebar-container">
            <form class="userDataForm">
                <div>
                    <label for="PlayerOneName">Player One</label>
                    <input type="text" id="PlayerOneName" placeholder="John" name="PlayerTwoName">
                </div>
                <div>
                    <label for="PlayerTwoName">Player Two</label>
                    <input type="text" id="PlayerTwoName" placeholder="Jarod" name="PlayerTwoName">
                </div>
                <div>
                    <button id="submit-button">Submit</button>
                </div>
            </form>
        </div>

        <div class="main-content-container">
            <button class="newButton">New</button>
            <div class="board-container">
            </div>
        </div>
    </div>

</body>

</html>
